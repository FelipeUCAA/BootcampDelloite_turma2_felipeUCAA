<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
    <h1 class="mb-4">Gerenciar Usuários</h1>

    <!-- formulario usuario -->
    <form id="formUsuario" class="mb-4">
        <input type="hidden" id="idUsuario">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <button type="button" id="btnSair" class="btn btn-secondary">Sair</button>
    </form>

    <div id="mensagem"></div>

    <!-- tabela usuarios -->
    <div class="tabela-container">
        <table id="tabelaUsuarios" class="table table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- busca por id -->
    <div class="mb-4">
        <label for="buscarId" class="form-label">Buscar usuário por ID:</label>
        <div class="input-group">
            <input type="number" id="buscarId" class="form-control" placeholder="ID do usuário">
            <button id="btnBuscar" class="btn btn-info">Buscar</button>
        </div>
        <div id="resultadoBusca" class="mt-2"></div>
    </div>
    <!-- modal de edicao -->
    <div class="modal fade" id="editarModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <form class="modal-content" id="formEditar">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editarId">
                    <div class="mb-3">
                        <label for="editarNome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="editarNome" required>
                    </div>
                    <div class="mb-3">
                        <label for="editarEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="editarEmail" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Salvar alterações</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
